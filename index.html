<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Садовод — лес продуктивности</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#1a4d2a;font-family:sans-serif;padding:20px;}
        .app{max-width:500px;margin:0 auto;}
        .tree-card{background:#fff9f0;border-radius:48px;padding:24px;text-align:center;margin-bottom:20px;box-shadow:0 8px 20px rgba(0,0,0,0.2);}
        .tree-emoji{font-size:100px;}
        .tree-name{font-size:22px;font-weight:bold;color:#2b5e2b;margin:8px 0;}
        .tree-task{font-size:14px;color:#666;margin-bottom:12px;}
        .progress-bar{border-radius:20px;height:12px;background:#e0d6c8;margin:16px 0;overflow:hidden;}
        .progress-fill{height:100%;background:#4caf50;width:0%;transition:width 0.3s;}
        .water-btn{background:#4caf50;border:none;color:white;padding:12px 24px;border-radius:40px;font-size:18px;font-weight:bold;cursor:pointer;width:80%;}
        .tasks-section{background:#fff9f0;border-radius:32px;padding:20px;}
        .section-title{font-weight:bold;margin-bottom:12px;border-left:4px solid #4caf50;padding-left:12px;}
        .task-item{background:white;border-radius:40px;padding:12px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
        .task-title{font-weight:600;}
        .task-status{font-size:12px;color:gray;}
        .task-water{background:#d4f0d4;border:none;padding:6px 12px;border-radius:30px;cursor:pointer;font-size:12px;}
        .add-task{display:flex;gap:8px;margin-top:16px;}
        .add-task input{flex:1;padding:12px;border-radius:40px;border:1px solid #ccc;}
        .add-task button{background:#4caf50;border:none;padding:0 20px;border-radius:40px;color:white;font-weight:bold;cursor:pointer;}
        footer{text-align:center;color:#c8e6c8;font-size:11px;margin-top:20px;}
        .main-badge{font-size:12px;background:#ffd966;border-radius:20px;padding:2px 8px;margin-left:8px;}
    </style>
</head>
<body>
<div class="app">
    <div class="tree-card">
        <div class="tree-emoji" id="treeEmoji">🌱</div>
        <div class="tree-name" id="treeName">Росток</div>
        <div class="tree-task" id="treeTask">Посади дело</div>
        <div class="progress-bar"><div class="progress-fill" id="treeProgress"></div></div>
        <button class="water-btn" id="waterMain">💧 Полить главное дело</button>
    </div>
    <div class="tasks-section">
        <div class="section-title">🌱 Мои дела</div>
        <div id="tasksList"></div>
        <div class="add-task">
            <input type="text" id="newTaskName" placeholder="Новое дело...">
            <button id="addTask">🌱 Посадить</button>
        </div>
    </div>
    <footer>Поливай каждый день — дерево растёт!</footer>
</div>
<script>
    let tasks = [];
    let mainTaskId = null;

    function save() { localStorage.setItem('gardener', JSON.stringify({tasks, mainTaskId})); }
    function load() {
        let d = localStorage.getItem('gardener');
        if(d) { let p = JSON.parse(d); tasks = p.tasks; mainTaskId = p.mainTaskId; }
        if(!tasks || tasks.length===0) {
            tasks = [{id:Date.now(), title:"Познакомиться с садоводом", progress:0}];
            mainTaskId = tasks[0].id;
        }
        render();
    }
    function getMain() { return tasks.find(t=>t.id===mainTaskId) || tasks[0]; }
    function emoji(p) { if(p<15) return '🌱'; if(p<35) return '🌿'; if(p<60) return '🌳'; if(p<85) return '🍎🌳'; return '🏆🌲'; }
    function stage(p) { if(p<15) return 'Росток'; if(p<35) return 'Саженец'; if(p<60) return 'Дерево'; if(p<85) return 'Плодоносит'; return 'Исполин'; }
    function water(id) {
        let t = tasks.find(t=>t.id===id);
        if(t && t.progress<100) { t.progress = Math.min(100, t.progress+20); save(); render(); }
    }
    function setMain(id) { mainTaskId = id; save(); render(); }
    function addTask(title) {
        if(!title.trim()) return;
        tasks.push({id:Date.now(), title:title.trim(), progress:0});
        if(tasks.length===1) mainTaskId = tasks[0].id;
        save(); render();
    }
    function render() {
        let main = getMain();
        document.getElementById('treeEmoji').innerText = emoji(main.progress);
        document.getElementById('treeName').innerText = stage(main.progress);
        document.getElementById('treeTask').innerText = main.title;
        document.getElementById('treeProgress').style.width = main.progress+'%';
        let container = document.getElementById('tasksList');
        if(tasks.length===0) { container.innerHTML = '<div style="text-align:center;">✨ Посади первое дело ✨</div>'; return; }
        container.innerHTML = tasks.map(t => `
            <div class="task-item">
                <div><strong>${escapeHtml(t.title)}</strong> ${t.id===mainTaskId?'<span class="main-badge">⭐Главное</span>':''}<br>
                <span class="task-status">${t.progress}%</span>
                <div style="background:#e0d6c8;border-radius:10px;width:100px;height:5px;margin-top:6px;"><div style="background:#4caf50;width:${t.progress}%;height:5px;border-radius:10px;"></div></div>
                </div>
                <div style="display:flex;gap:6px;">
                    <button class="task-water" data-id="${t.id}">💧 Полить</button>
                    ${t.id!==mainTaskId?`<button class="task-make-main" data-id="${t.id}" style="background:none;border:none;font-size:18px;cursor:pointer;">👑</button>`:''}
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.task-water').forEach(b=>b.addEventListener('click',e=>water(parseInt(b.dataset.id))));
        document.querySelectorAll('.task-make-main').forEach(b=>b.addEventListener('click',e=>setMain(parseInt(b.dataset.id))));
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    document.getElementById('addTask').onclick = () => { addTask(document.getElementById('newTaskName').value); document.getElementById('newTaskName').value=''; };
    document.getElementById('waterMain').onclick = () => { let m=getMain(); if(m) water(m.id); };
    document.getElementById('newTaskName').addEventListener('keypress', e=>{if(e.key==='Enter') addTask(e.target.value); e.target.value='';});
    load();
</script>
</body>
</html>
