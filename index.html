<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sadovod/sw.js')
                .then(() => console.log('Service Worker зарегистрирован!'))
                .catch(err => console.log('Ошибка:', err));
        }
    </script>
    <script async id="wepp-install-modal" src="https://cdn.jsdelivr.net/gh/ryxxn/pwa-install-prompt@main/index.js"></script>
    <title>Садовод — лес продуктивности</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#1a4d2a;font-family:sans-serif;padding:20px;}
        .app{max-width:500px;margin:0 auto;}
        
        .tree-card{background:#fff9f0;border-radius:48px;padding:24px;text-align:center;margin-bottom:20px;box-shadow:0 8px 20px rgba(0,0,0,0.1);}
        .tree-emoji{font-size:100px;}
        .tree-name{font-size:22px;font-weight:bold;color:#2b5e2b;margin:8px 0;}
        .tree-task{font-size:14px;color:#666;margin-bottom:12px;}
        .progress-bar{background:#e0d6c8;border-radius:20px;height:12px;margin:16px 0;overflow:hidden;}
        .progress-fill{background:#4caf50;width:0%;height:100%;transition:width 0.3s;}
        .water-btn{background:#4caf50;border:none;color:white;padding:12px 24px;border-radius:40px;font-size:18px;font-weight:bold;cursor:pointer;width:80%;}
        
        .tasks-section{background:#fff9f0;border-radius:32px;padding:20px;margin-top:20px;}
        .section-title{font-weight:bold;margin-bottom:12px;border-left:4px solid #4caf50;padding-left:12px;}
        
        .task-item{background:white;border-radius:24px;padding:12px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
        .task-info{flex:2;min-width:120px;}
        .task-title{font-weight:600;}
        .task-title.completed{text-decoration:line-through;color:#888;}
        .task-stages{font-size:12px;color:gray;margin-top:4px;}
        .task-actions{display:flex;gap:8px;align-items:center;}
        .task-water{background:#d4f0d4;border:none;padding:8px 16px;border-radius:30px;cursor:pointer;font-size:14px;font-weight:bold;}
        .task-delete{background:#ffe0e0;border:none;padding:8px 16px;border-radius:30px;cursor:pointer;font-size:14px;color:#c0392b;}
        
        .add-task{display:flex;flex-direction:column;gap:12px;margin-top:20px;padding-top:16px;border-top:1px solid #e0d6c8;}
        .add-task input{width:100%;padding:12px;border-radius:40px;border:1px solid #ccc;font-size:14px;}
        .stages-selector{display:flex;align-items:center;justify-content:center;gap:15px;background:#f5f0e8;padding:10px;border-radius:40px;}
        .stages-selector button{width:44px;height:44px;border-radius:44px;border:none;font-size:24px;font-weight:bold;cursor:pointer;background:#4caf50;color:white;}
        .stages-selector span{font-size:24px;font-weight:bold;min-width:40px;text-align:center;}
        .stages-label{text-align:center;font-size:12px;color:#666;margin-bottom:5px;}
        .add-task button.plant{background:#4caf50;border:none;padding:14px;border-radius:40px;color:white;font-weight:bold;cursor:pointer;font-size:16px;}
        
        footer{text-align:center;color:#c8e6c8;font-size:11px;margin-top:20px;}
        .progress-small{background:#e0d6c8;border-radius:10px;height:6px;width:100%;margin-top:6px;overflow:hidden;}
        .progress-small-fill{background:#4caf50;height:100%;width:0%;}
    </style>
</head>
<body>
<div class="app">
    <div class="tree-card">
        <div class="tree-emoji" id="treeEmoji">🌱</div>
        <div class="tree-name" id="treeName">Росток</div>
        <div class="tree-task" id="treeTask">Посади дело</div>
        <div class="progress-bar"><div class="progress-fill" id="treeProgress"></div></div>
        <button class="water-btn" id="waterMain">💧 Полить главное дело</button>
    </div>

    <div class="tasks-section">
        <div class="section-title">🌱 Мои дела</div>
        <div id="tasksList"></div>
        
        <div class="add-task">
            <input type="text" id="newTaskName" placeholder="Название дела...">
            
            <div class="stages-label">Количество этапов (поливов):</div>
            <div class="stages-selector">
                <button id="stagesMinus">-</button>
                <span id="stagesValue">1</span>
                <button id="stagesPlus">+</button>
            </div>
            
            <button class="plant" id="addTask">🌱 Посадить</button>
        </div>
    </div>
    <footer>1 этап = разовое дело. Больше этапов = дерево растёт дольше 🌳</footer>
</div>

<script>
    let tasks = [];
    let selectedStages = 1;

    function save() { localStorage.setItem('sadovod', JSON.stringify({tasks})); }
    
    function load() {
        let d = localStorage.getItem('sadovod');
        if(d) { let p = JSON.parse(d); tasks = p.tasks; }
        if(!tasks || tasks.length===0) {
            tasks = [];
        }
        render();
    }
    
    function getMainTask() {
        let staged = tasks.find(t => !t.completed && t.stages > 1);
        if(staged) return staged;
        return tasks.find(t => !t.completed);
    }
    
    function emoji(progress) {
        if(progress < 15) return '🌱';
        if(progress < 35) return '🌿';
        if(progress < 60) return '🌳';
        if(progress < 85) return '🍎🌳';
        return '🏆🌲';
    }
    
    function stageName(progress) {
        if(progress < 15) return 'Росток';
        if(progress < 35) return 'Саженец';
        if(progress < 60) return 'Дерево';
        if(progress < 85) return 'Плодоносит';
        return 'Исполин';
    }
    
    function waterTask(taskId) {
        let t = tasks.find(t => t.id === taskId);
        if(t && !t.completed && t.current < t.stages) {
            t.current++;
            if(t.current === t.stages) {
                t.completed = true;
            }
            save();
            render();
        }
    }
    
    function deleteTask(taskId) {
        tasks = tasks.filter(t => t.id !== taskId);
        save();
        render();
    }
    
    function addTask(title, stages) {
        if(!title.trim()) return;
        
        let newTask = {
            id: Date.now(),
            title: title.trim(),
            stages: parseInt(stages),
            current: 0,
            completed: false
        };
        
        tasks.push(newTask);
        save();
        render();
        document.getElementById('newTaskName').value = '';
        selectedStages = 1;
        document.getElementById('stagesValue').innerText = '1';
    }
    
    function render() {
        let mainTask = getMainTask();
        
        if(mainTask) {
            let progress = Math.floor((mainTask.current / mainTask.stages) * 100);
            document.getElementById('treeEmoji').innerText = emoji(progress);
            document.getElementById('treeName').innerText = stageName(progress);
            document.getElementById('treeTask').innerText = mainTask.title;
            document.getElementById('treeProgress').style.width = progress + '%';
        } else {
            document.getElementById('treeEmoji').innerText = '🏆🌲';
            document.getElementById('treeName').innerText = 'Сад';
            document.getElementById('treeTask').innerText = 'Все дела сделаны!';
            document.getElementById('treeProgress').style.width = '100%';
        }
        
        let container = document.getElementById('tasksList');
        if(tasks.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:20px;">✨ Посади первое дело ✨</div>';
            return;
        }
        
        container.innerHTML = tasks.map(t => {
            let isCompleted = t.completed;
            let progressPercent = Math.floor((t.current / t.stages) * 100);
            let icon = t.stages === 1 ? '🍃' : '🌳';
            let stagesText = t.stages === 1 ? 'Разовое дело' : `${t.current}/${t.stages} этапов (${progressPercent}%)`;
            
            return `
                <div class="task-item">
                    <div class="task-info">
                        <div class="task-title ${isCompleted ? 'completed' : ''}">${icon} ${escapeHtml(t.title)}</div>
                        <div class="task-stages">${stagesText}</div>
                        ${t.stages > 1 ? `<div class="progress-small"><div class="progress-small-fill" style="width:${progressPercent}%;"></div></div>` : ''}
                    </div>
                    <div class="task-actions">
                        ${!isCompleted ? `<button class="task-water" data-id="${t.id}">💧 Полить</button>` : `<span style="color:green;">✅ Готово</span>`}
                        <button class="task-delete" data-id="${t.id}">🗑</button>
                    </div>
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.task-water').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); waterTask(parseInt(btn.dataset.id)); });
        });
        document.querySelectorAll('.task-delete').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); deleteTask(parseInt(btn.dataset.id)); });
        });
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    document.getElementById('stagesMinus').onclick = () => {
        if(selectedStages > 1) {
            selectedStages--;
            document.getElementById('stagesValue').innerText = selectedStages;
        }
    };
    document.getElementById('stagesPlus').onclick = () => {
        if(selectedStages < 10) {
            selectedStages++;
            document.getElementById('stagesValue').innerText = selectedStages;
        }
    };
    
    document.getElementById('addTask').onclick = () => {
        let title = document.getElementById('newTaskName').value;
        addTask(title, selectedStages);
    };
    
    document.getElementById('newTaskName').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') {
            addTask(e.target.value, selectedStages);
        }
    });
    
    document.getElementById('waterMain').onclick = () => {
        let mainTask = getMainTask();
        if(mainTask) waterTask(mainTask.id);
    };
    
    load();
</script>
</body>
</html>
